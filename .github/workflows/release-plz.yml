name: release-plz

# Runs release-plz on every push to `master`:
#   * "release" step publishes any version bumped on master to crates.io;
#   * "release-pr" step opens/updates the release PR with the next version bump.
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN — a crates.io API token with publish rights.
#   RELEASE_PLZ_TOKEN    — a Personal Access Token (PAT) with contents:write +
#                          pull-requests:write. Used INSTEAD of the default
#                          GITHUB_TOKEN because GitHub forbids the default token
#                          from triggering other workflows: with the PAT, the
#                          `v*` tag release-plz pushes fires `release.yml`
#                          (the C ABI GitHub Release), and CI runs on the
#                          release PR. Wired into both the checkout `token:` and
#                          the action's `GITHUB_TOKEN` env per release-plz docs.
#                          Falls back to GITHUB_TOKEN if the secret is absent
#                          (crates.io publish still works; tag/PR triggering does
#                          not). https://release-plz.dev/docs/github/token
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        id: release-plz
