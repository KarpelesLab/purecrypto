# cargo-fuzz workspace for purecrypto.
#
# Runs under nightly Rust with libFuzzer instrumentation. The main crate's
# stable-Rust PR CI does not touch this directory; the dedicated
# `.github/workflows/fuzz.yml` workflow runs the targets here on a weekly
# schedule and on manual dispatch.
#
# Local use:
#   cargo +nightly fuzz run <target> -- -max_total_time=60
#
# See `fuzz/README.md` for triage and corpus conventions.

[package]
name = "purecrypto-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
# Pull in every gated module the targets exercise. Matches the all-features
# CI configuration so a feature gate added upstream can't silently bitrot
# a target here.
purecrypto = { path = "..", features = [
    "std", "alloc", "hash", "cipher", "kdf", "mac", "bignum", "rng",
    "rsa", "dh", "der", "x509", "ec", "tls", "dtls", "quic",
    "mlkem", "mldsa", "slhdsa", "hpke", "ech", "cert-compression",
] }

# Optimised debug info so libFuzzer's stack traces and `cargo fuzz fmt`
# pretty-prints stay useful even at release-opt levels.
[profile.release]
debug = 1

# --- one entry per fuzz target. cargo-fuzz also auto-discovers
# fuzz_targets/*.rs, but listing them explicitly keeps `cargo fuzz list`
# stable and avoids surprises from stray scratch files.

# --- File-format parsers (direct public entry points)

