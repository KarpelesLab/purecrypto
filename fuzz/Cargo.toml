# --- Network targets (via the public Connection::feed / feed_datagram API).
# Each target stands up a fresh Connection per iteration and feeds fuzz
# bytes as if they came from the wire. Exercises record layer + codec +
# handshake state machine end-to-end.

[[bin]]
name = "tls_server_feed"
path = "fuzz_targets/tls_server_feed.rs"
test = false
doc = false
bench = false

